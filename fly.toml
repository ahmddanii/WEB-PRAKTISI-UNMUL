# fly.toml app configuration file generated for praktisi-unmul on 2026-06-27T18:04:08+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'praktisi-unmul'
primary_region = 'sin'
console_command = 'php /var/www/html/artisan tinker'

[build]
  [build.args]
    NODE_VERSION = '18'
    PHP_VERSION = '8.2'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  APP_FALLBACK_LOCALE = 'en'
  APP_LOCALE = 'en'
  APP_URL = 'https://praktisi-unmul.fly.dev'
  BCRYPT_ROUNDS = '12'
  CACHE_STORE = 'file'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/var/www/html/storage/database/database.sqlite'
  FILESYSTEM_DISK = 'local'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  MAIL_ENCRYPTION = 'ssl'
  MAIL_FROM_ADDRESS = 'admpraktikumsiunmul@gmail.com'
  MAIL_FROM_NAME = 'PRAKTISI-UNMUL'
  MAIL_HOST = 'smtp.gmail.com'
  MAIL_MAILER = 'smtp'
  MAIL_PORT = '465'
  MAIL_USERNAME = 'admpraktikumsiunmul@gmail.com'
  QUEUE_CONNECTION = 'sync'
  SESSION_DRIVER = 'cookie'
  SESSION_LIFETIME = '120'
  SESSION_SECURE_COOKIE = 'true'

[[mounts]]
  source = 'storage_vol'
  destination = '/var/www/html/storage'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
